<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juice Archive</title>
<link rel="preload" href="https://juicewrldapi.com/assets/hero.svg" as="image" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080808;
  --surface:  #0f0f0f;
  --surface2: #161616;
  --surface3: #1e1e1e;
  --surface4: #252525;
  --border:   rgba(255,255,255,.06);
  --border2:  rgba(255,255,255,.12);
  --red:      #e8352a;
  --red2:     #ff4f43;
  --red-dim:  rgba(232,53,42,.15);
  --red-glow: rgba(232,53,42,.3);
  --text:     #f5f5f5;
  --sub:      #888;
  --dim:      #444;
  --t:        .18s cubic-bezier(.4,0,.2,1);
  --r:        10px;
  --r2:       6px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html,body { height:100%; overflow:hidden }
body {
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',system-ui,sans-serif;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit }
input  { font-family:inherit; color:inherit; background:none; border:none; outline:none }
img    { display:block }
a      { color:inherit; text-decoration:none }
::-webkit-scrollbar { width:4px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--surface4); border-radius:2px }
::-webkit-scrollbar-thumb:hover { background:var(--dim) }
#shell   { display:flex; flex:1; min-height:0; gap:0 }
#sidebar {
  width:260px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  background:var(--surface);
  border-right:1px solid var(--border);
}
.logo-wrap {
  padding:24px 20px 20px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  flex-shrink:0;
}
.logo-img {
  height:36px;
  width:auto;
  filter:brightness(0) invert(1);
  transition:filter var(--t);
}
.logo-wrap:hover .logo-img { filter:brightness(0) invert(1) drop-shadow(0 0 8px var(--red2)); }
.nav-section {
  padding:16px 12px 8px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.nav-label {
  font-size:.62rem;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--dim);
  padding:0 8px 8px;
}
.nav-item {
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 8px;
  border-radius:var(--r2);
  color:var(--sub);
  font-weight:600;
  font-size:.875rem;
  cursor:pointer;
  transition:all var(--t);
  position:relative;
}
.nav-item:hover { color:var(--text); background:var(--surface2) }
.nav-item.active { color:var(--text) }
.nav-item.active::before {
  content:'';
  position:absolute;
  left:0; top:25%; bottom:25%;
  width:2px;
  background:var(--red);
  border-radius:1px;
}
.nav-item svg { width:18px; height:18px; flex-shrink:0 }
.lib-section {
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
  padding:16px 12px 12px;
}
.lib-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 8px 12px;
}
.lib-title {
  font-size:.62rem;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--dim);
}
.lib-actions { display:flex; gap:4px }
.lib-btn {
  width:28px; height:28px;
  border-radius:var(--r2);
  display:flex; align-items:center; justify-content:center;
  color:var(--sub);
  transition:all var(--t);
}
.lib-btn:hover { background:var(--surface2); color:var(--text) }
.lib-btn svg { width:15px; height:15px }
.lib-scroll { flex:1; overflow-y:auto }
.pl-item {
  display:flex;
  align-items:center;
  gap:12px;
  padding:8px;
  border-radius:var(--r2);
  cursor:pointer;
  transition:background var(--t);
  margin-bottom:1px;
}
.pl-item:hover { background:var(--surface2) }
.pl-item.active { background:var(--surface3) }
.pl-art {
  width:44px; height:44px;
  border-radius:var(--r2);
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  position:relative;
}
.pl-art-liked {
  background:linear-gradient(135deg,#1a0a3d 0%,#6b21a8 50%,#a855f7 100%);
  color:#fff;
}
.pl-art-custom {
  background:var(--surface3);
  color:var(--dim);
}
.pl-art-cat {
  border-radius:var(--r2);
  color:#fff;
}
.pl-art-cat.cat-released   { background:linear-gradient(135deg,#064e3b,#10b981) }
.pl-art-cat.cat-unreleased { background:linear-gradient(135deg,#7f1d1d,var(--red)) }
.pl-art-cat.cat-unsurfaced { background:linear-gradient(135deg,#1e3a5f,#3b82f6) }
.pl-art-cat.cat-session    { background:linear-gradient(135deg,#3b2000,#f59e0b) }
.pl-info { flex:1; min-width:0 }
.pl-name {
  font-weight:700;
  font-size:.82rem;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--text);
}
.pl-meta {
  font-size:.72rem;
  color:var(--sub);
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.lib-empty {
  padding:20px 8px;
  font-size:.78rem;
  color:var(--dim);
  line-height:1.6;
}
.lib-empty strong { display:block; color:var(--sub); margin-bottom:4px }
#main {
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  overflow:hidden;
}
.topbar {
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 28px;
  background:#0d0d0d;
  border-bottom:1px solid var(--border);
  position:relative;
  z-index:10;
}
.search-wrap {
  flex:1;
  max-width:400px;
  position:relative;
}
.search-inner {
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:10px 14px;
  transition:all var(--t);
}
.search-inner:focus-within {
  border-color:var(--border2);
  background:var(--surface3);
}
.search-inner svg { color:var(--sub); flex-shrink:0; width:15px; height:15px }
.search-inner input {
  flex:1;
  font-size:.875rem;
  color:var(--text);
  font-weight:500;
}
.search-inner input::placeholder { color:var(--dim) }
.search-go {
  background:var(--red);
  color:#fff;
  border-radius:6px;
  padding:6px 14px;
  font-size:.75rem;
  font-weight:700;
  letter-spacing:.04em;
  transition:all var(--t);
  flex-shrink:0;
}
.search-go:hover { background:var(--red2); transform:scale(1.03) }
.upload-btn {
  display:flex;
  align-items:center;
  gap:7px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:var(--r);
  padding:9px 16px;
  font-size:.78rem;
  font-weight:700;
  letter-spacing:.03em;
  color:var(--sub);
  transition:all var(--t);
  flex-shrink:0;
}
.upload-btn:hover { background:var(--red-dim); border-color:rgba(232,53,42,.4); color:var(--red2); }
.upload-btn svg { width:15px; height:15px; flex-shrink:0 }
.pages { flex:1; overflow-y:auto; position:relative; contain:layout style; }
.page  { padding:0 28px 120px; display:none }
.page.active { display:block }
.page-hero {
  padding:48px 28px 32px;
  margin:0 -28px 32px;
  position:relative;
  overflow:hidden;
}
.hero-bg {
  position:absolute;
  inset:0;
  background:linear-gradient(160deg, rgba(232,53,42,.18) 0%, rgba(232,53,42,.05) 50%, transparent 100%);
  pointer-events:none;
}
.hero-bg::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent 60%, var(--bg) 100%);
}
.hero-content { position:relative; z-index:1 }
.hero-eyebrow {
  font-size:.65rem;
  font-weight:700;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--red);
  margin-bottom:10px;
}
.hero-title {
  font-size:clamp(2rem,4vw,3.2rem);
  font-weight:800;
  letter-spacing:-.04em;
  line-height:.95;
  margin-bottom:12px;
  color:var(--text);
}
.hero-sub {
  font-size:.875rem;
  color:var(--sub);
  font-weight:500;
}
.hero-stats {
  display:flex;
  gap:24px;
  margin-top:20px;
}
.hero-stat { display:flex; flex-direction:column; gap:2px }
.hero-stat-num {
  font-size:1.1rem;
  font-weight:800;
  letter-spacing:-.04em;
  color:var(--text);
}
.hero-stat-label {
  font-size:.65rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--dim);
}
.section { margin-bottom:36px }
.section-head {
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:16px;
}
.section-title {
  font-size:1.1rem;
  font-weight:800;
  letter-spacing:-.03em;
}
.section-more {
  font-size:.7rem;
  font-weight:700;
  color:var(--sub);
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  transition:color var(--t);
}
.section-more:hover { color:var(--text) }
.cards-row {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:12px;
}
.mcard {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px;
  cursor:pointer;
  transition:all var(--t);
  position:relative;
  will-change:transform;
}
.mcard:hover {
  background:var(--surface2);
  border-color:var(--border2);
  transform:translateY(-2px);
}
.mcard:hover .card-play { opacity:1; transform:translateY(0) scale(1) }
.card-art {
  width:100%;
  aspect-ratio:1;
  border-radius:var(--r2);
  margin-bottom:12px;
  overflow:hidden;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card-art-released   { background:linear-gradient(135deg,#064e3b 0%,#065f46 40%,#047857 100%) }
.card-art-unreleased { background:linear-gradient(135deg,#450a0a 0%,#7f1d1d 40%,#991b1b 100%) }
.card-art-unsurfaced { background:linear-gradient(135deg,#0c1a2e 0%,#1e3a5f 40%,#1d4ed8 100%) }
.card-art-session    { background:linear-gradient(135deg,#1c0f00 0%,#451a03 40%,#92400e 100%) }
.card-art-default    { background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 100%) }
.card-play {
  position:absolute;
  bottom:8px; right:8px;
  width:40px; height:40px;
  border-radius:50%;
  background:var(--red);
  display:flex; align-items:center; justify-content:center;
  opacity:0;
  transform:translateY(6px) scale(.9);
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px rgba(232,53,42,.5);
}
.card-dl {
  position:absolute;
  bottom:8px; left:8px;
  width:30px; height:30px;
  border-radius:50%;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  opacity:0;
  transform:translateY(6px) scale(.9);
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  color:#fff;
  border:none;
  cursor:pointer;
}
.mcard:hover .card-dl { opacity:1; transform:translateY(0) scale(1); }
.card-dl:hover { background:rgba(0,0,0,.8); }
.card-play svg { width:16px; height:16px; margin-left:2px }
.card-title {
  font-weight:700;
  font-size:.82rem;
  margin-bottom:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  letter-spacing:-.01em;
}
.card-sub {
  font-size:.72rem;
  color:var(--sub);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.badge {
  display:inline-block;
  font-size:.55rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:2px 5px;
  border-radius:3px;
  margin-left:5px;
  vertical-align:middle;
}
.badge-released   { background:rgba(16,185,129,.15); color:#10b981 }
.badge-unreleased { background:var(--red-dim);       color:var(--red2) }
.badge-unsurfaced { background:rgba(59,130,246,.15); color:#60a5fa }
.badge-session    { background:rgba(245,158,11,.15); color:#fbbf24 }
.track-list { display:flex; flex-direction:column; gap:1px; }
.trow {
  display:grid;
  grid-template-columns:28px 40px 1fr auto;
  align-items:center;
  gap:12px;
  padding:7px 10px;
  border-radius:var(--r2);
  cursor:pointer;
  contain:layout style paint;
  content-visibility:auto;
  contain-intrinsic-size:0 56px;
}
.trow.removing { opacity:0; transition:opacity .25s; pointer-events:none; }
.trow:hover { background:var(--surface2) }
.trow.playing .tnum  { color:var(--red) }
.trow.playing .ttitle { color:var(--red) }
.trow.hash-highlight {
  background: rgba(232,53,42,.18);
  outline: 1px solid rgba(232,53,42,.4);
  transition: background .4s, outline .4s;
}
.tnum {
  font-size:.78rem;
  color:var(--sub);
  text-align:center;
  font-family:'Syne Mono', monospace;
}
.tart {
  width:40px; height:40px;
  border-radius:5px;
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.tart-released   { background:linear-gradient(135deg,#064e3b,#047857) }
.tart-unreleased { background:linear-gradient(135deg,#7f1d1d,#991b1b) }
.tart-unsurfaced { background:linear-gradient(135deg,#1e3a5f,#1d4ed8) }
.tart-session    { background:linear-gradient(135deg,#451a03,#92400e) }
.tart-default    { background:var(--surface3) }
.tinfo    { min-width:0 }
.ttitle   { font-weight:600; font-size:.84rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-.01em }
.tartist  { font-size:.72rem; color:var(--sub); margin-top:1px }
.tlistening {
  display:block;
  font-size:.65rem;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--red2);
  margin-top:2px;
  opacity:0;
  transition:opacity .2s;
}
.trow.playing .tlistening { opacity:1; }
.tdur     { font-size:.72rem; color:var(--dim); font-family:'Syne Mono',monospace }
.tdl-btn {
  width:28px; height:28px;
  border-radius:var(--r2);
  display:flex; align-items:center; justify-content:center;
  color:var(--dim);
  flex-shrink:0;
  opacity:0;
}
.trow:hover .tdl-btn { opacity:1; }
.tdl-btn:hover { color:var(--text); background:var(--surface3); }
.pl-hero {
  display:flex;
  gap:28px;
  padding:40px 28px 28px;
  align-items:flex-end;
  margin:0 -28px 28px;
  position:relative;
  overflow:hidden;
}
.pl-hero-bg {
  position:absolute;
  inset:0;
  background:linear-gradient(160deg,rgba(232,53,42,.2) 0%,transparent 100%);
}
.pl-hero-bg::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent 50%, var(--bg) 100%);
}
.pl-hero-art {
  width:180px; height:180px;
  border-radius:var(--r);
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem;
  font-weight:800;
  letter-spacing:-.02em;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
  position:relative;
  z-index:1;
}
.pl-hero-info { position:relative; z-index:1 }
.pl-type {
  font-size:.6rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--sub);
  margin-bottom:6px;
}
.pl-hname {
  font-size:clamp(1.4rem,3.5vw,2.6rem);
  font-weight:800;
  letter-spacing:-.04em;
  line-height:1;
  margin-bottom:8px;
}
.pl-hmeta { font-size:.82rem; color:var(--sub) }
.pl-ctrls { display:flex; align-items:center; gap:14px; padding:22px 0 4px }
.play-big {
  width:52px; height:52px;
  border-radius:50%;
  background:var(--red);
  display:flex; align-items:center; justify-content:center;
  transition:all var(--t);
  box-shadow:0 4px 24px var(--red-glow);
}
.play-big:hover { transform:scale(1.08); background:var(--red2) }
.play-big svg { width:22px; height:22px; margin-left:3px }
.ctrl-dl-all {
  display:flex;
  align-items:center;
  gap:7px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:var(--r);
  padding:10px 18px;
  font-size:.78rem;
  font-weight:700;
  letter-spacing:.03em;
  color:var(--sub);
  transition:all var(--t);
  cursor:pointer;
}
.ctrl-dl-all:hover { background:var(--surface3); color:var(--text); border-color:var(--border2); }
#playbar {
  flex-shrink:0;
  height:88px;
  background:#0a0a0a;
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:16px;
  z-index:100;
}
.now-info {
  display:flex;
  align-items:center;
  gap:12px;
  width:250px;
  flex-shrink:0;
  min-width:0;
}
.now-art {
  width:54px; height:54px;
  border-radius:var(--r2);
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  position:relative;
}
.now-art-inner { width:100%; height:100%; display:flex; align-items:center; justify-content:center }
.now-art-released   { background:linear-gradient(135deg,#064e3b,#047857) }
.now-art-unreleased { background:linear-gradient(135deg,#7f1d1d,#991b1b) }
.now-art-unsurfaced { background:linear-gradient(135deg,#1e3a5f,#1d4ed8) }
.now-art-session    { background:linear-gradient(135deg,#451a03,#92400e) }
.now-art-default    { background:var(--surface3) }
.now-text { flex:1; min-width:0 }
.now-title {
  font-size:.84rem;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:2px;
  letter-spacing:-.01em;
}
.now-artist { font-size:.72rem; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.heart-btn {
  color:var(--dim);
  width:32px; height:32px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  transition:all var(--t);
}
.heart-btn:hover { color:var(--text); transform:scale(1.1) }
.heart-btn.liked { color:var(--red) }
.heart-btn svg { width:17px; height:17px }
.center-ctrl {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  max-width:560px;
  margin:0 auto;
}
.ctrl-row { display:flex; align-items:center; gap:16px }
.cbtn {
  width:32px; height:32px;
  display:flex; align-items:center; justify-content:center;
  color:var(--sub);
  border-radius:50%;
  transition:all var(--t);
}
.cbtn:hover { color:var(--text); transform:scale(1.1) }
.cbtn.on  { color:var(--red) }
.cbtn svg { width:17px; height:17px }
.pp-btn {
  width:40px; height:40px;
  background:var(--text);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  transition:all var(--t);
  flex-shrink:0;
}
.pp-btn:hover { transform:scale(1.08); background:#e0e0e0 }
.pp-btn svg { width:17px; height:17px; color:#000 }
.pp-btn .i-play  { display:block }
.pp-btn .i-pause { display:none }
.pp-btn.playing .i-play  { display:none }
.pp-btn.playing .i-pause { display:block }
.prog-row { display:flex; align-items:center; gap:10px; width:100% }
.ptime {
  font-size:.65rem;
  color:var(--sub);
  width:34px;
  text-align:center;
  font-family:'Syne Mono',monospace;
}
.prog-track {
  flex:1;
  height:3px;
  background:var(--surface4);
  border-radius:2px;
  cursor:pointer;
  position:relative;
}
.prog-track:hover { height:5px; margin:-1px 0 }
.prog-track:hover .prog-fill { background:var(--red) }
.prog-fill {
  height:100%;
  background:var(--text);

/* ── Responsive Breakpoints ───────────────────────────────── */
@media (max-width: 768px) {
  /* Body: allow scroll on mobile, account for bottom bars */
  html, body { overflow: hidden; height: 100%; }

  /* Shell: stack vertically, sidebar hidden on mobile */
  #shell { flex-direction: column; }

  #sidebar { display: none; }

  /* Topbar: clean single-row search on mobile */
  .topbar {
    padding: 12px 14px;
    gap: 0;
    flex-wrap: nowrap;
  }
  .search-wrap {
    flex: 1;
    max-width: 100%;
    min-width: 0;
  }
  .search-inner {
    border-radius: 12px;
    padding: 11px 14px;
    background: var(--surface2);
    border-color: var(--border2);
  }
  .search-inner input { font-size: .9rem; }
  /* Hide upload button from topbar on mobile — it lives in the bottom nav */
  .upload-btn { display: none; }

  /* Pages: tighter padding so 4-col grid has more room */
  .page { padding: 0 10px 140px; }
  .page-hero { padding: 22px 10px 16px; margin: 0 -10px 18px; }
  .pl-hero {
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 22px 10px 16px;
    margin: 0 -10px 18px;
    gap: 16px;
  }
  .pl-hero-art { width: 140px; height: 140px; }
  .pl-ctrls { justify-content: center; }
  .hero-stats { gap: 16px; flex-wrap: wrap; }
  .hero-title { font-size: clamp(1.6rem, 7vw, 2.4rem); }
  .pl-hname   { font-size: clamp(1.2rem, 6vw, 2rem); }

  /* Cards grid: 4 columns, compact on mobile */
  .cards-row { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .mcard { padding: 7px; border-radius: 8px; }
  .card-art { margin-bottom: 7px; border-radius: 5px; }
  .card-title { font-size: .68rem; margin-bottom: 1px; letter-spacing: 0; }
  .card-sub   { font-size: .6rem; }
  /* Smaller play button on mobile cards */
  .card-play { width: 26px; height: 26px; bottom: 5px; right: 5px; }
  .card-play svg { width: 10px; height: 10px; margin-left: 1px; }
  /* Hide download button on card art (too crowded at 4-col) */
  .card-dl { display: none; }
  /* Always show play button on mobile (no hover needed) */
  .card-play { opacity: 1; transform: translateY(0) scale(1); }

  /* Track rows: hide track number column, compress */
  .trow {
    grid-template-columns: 36px 1fr auto;
    gap: 10px;
    padding: 6px 8px;
  }
  .tnum { display: none; }
  /* Always show dl button on mobile */
  .tdl-btn { opacity: 1; }

  /* Playbar: 2-row compact layout */
  #playbar {
    height: auto;
    flex-direction: column;
    padding: 8px 12px 10px;
    gap: 6px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  .now-info {
    width: 100%;
    gap: 10px;
  }
  .now-art { width: 42px; height: 42px; }
  .now-title  { font-size: .78rem; }
  .now-artist { font-size: .66rem; }
  /* Compact heart / lyrics buttons */
  .heart-btn { width: 28px; height: 28px; }
  .heart-btn svg { width: 15px; height: 15px; }

  .center-ctrl {
    width: 100%;
    gap: 4px;
    max-width: 100%;
    margin: 0;
  }
  .ctrl-row { gap: 10px; }
  .cbtn { width: 28px; height: 28px; }
  .cbtn svg { width: 15px; height: 15px; }
  .pp-btn { width: 36px; height: 36px; }
  .pp-btn svg { width: 15px; height: 15px; }
  .prog-row { gap: 6px; }
  .ptime { width: 28px; font-size: .6rem; }

  /* Hide right controls (volume etc.) on mobile */
  .right-ctrl { display: none; }

  /* Mobile Bottom Nav */
  #mobile-nav {
    display: flex;
    align-items: center;
    justify-content: space-around;
    background: #0a0a0a;
    border-top: 1px solid var(--border);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    flex-shrink: 0;
    z-index: 200;
  }
  .mob-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: var(--sub);
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 4px 16px;
    border-radius: var(--r2);
    cursor: pointer;
    transition: color var(--t);
    background: none;
    border: none;
    font-family: inherit;
  }
  .mob-nav-item svg { width: 20px; height: 20px; }
  .mob-nav-item.active { color: var(--text); }
  .mob-nav-item.active svg { color: var(--red); }

  /* Modals: full-width on mobile */
  .modal { width: calc(100vw - 32px); max-width: 420px; padding: 20px; }
  .upload-modal { width: calc(100vw - 32px); max-width: 460px; }
  .lyrics-modal { width: calc(100vw - 24px); max-height: 88vh; }

  /* Section: less bottom margin */
  .section { margin-bottom: 24px; }
  .section-title { font-size: 1rem; }
}

@media (max-width: 480px) {
  .topbar { padding: 8px 10px; }
  .page { padding: 0 8px 140px; }
  .page-hero { padding: 18px 8px 14px; margin: 0 -8px 16px; }
  .pl-hero { padding: 18px 8px 14px; margin: 0 -8px 16px; }
  .hero-stats { gap: 10px; }
  /* 4 columns, even tighter gap */
  .cards-row { gap: 5px; }
  .mcard { padding: 6px; }
  .card-title { font-size: .62rem; }
  .card-sub   { font-size: .56rem; }
}

var _lyricsCache = {};
function openLyrics(track) {
  var modal = document.getElementById('lyricsModal');
  var body  = document.getElementById('lyricsBody');
  document.getElementById('lyricsSongTitle').textContent  = track.title  || '—';
  document.getElementById('lyricsSongArtist').textContent = track.artist || 'Juice WRLD';
  body.innerHTML = '<div class="lyrics-loading"><div class="spinner" style="margin:0"></div>Fetching lyrics…</div>';
  modal.classList.remove('hidden');

  var cacheKey = (track.artist + '|||' + track.title).toLowerCase();
  if (_lyricsCache[cacheKey]) {
    renderLyrics(body, _lyricsCache[cacheKey]);
    return;
  }

  
  var cleanTitle  = track.title.replace(/\s*\(feat\..*?\)/gi,'').replace(/\s*\[.*?\]/g,'').replace(/\s*\(prod\..*?\)/gi,'').trim();
  var cleanArtist = (track.artist || 'Juice WRLD').replace(/\s*(feat\.|ft\.|x ).*$/i,'').trim();
  var url = 'https://api.lyrics.ovh/v1/' + encodeURIComponent(cleanArtist) + '/' + encodeURIComponent(cleanTitle);

  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('not found');
      return r.json();
    })
    .then(function(data) {
      if (!data.lyrics || !data.lyrics.trim()) throw new Error('empty');
      _lyricsCache[cacheKey] = data.lyrics;
      renderLyrics(body, data.lyrics);
    })
    .catch(function() {
      body.innerHTML =
        '<div class="lyrics-err">'+
          '<strong>Lyrics not found</strong>'+
          '<p>lyrics.ovh doesn\'t have this track.<br>Try searching on <a href="https://genius.com/search?q='+encodeURIComponent((track.artist||'Juice WRLD')+' '+track.title)+'" target="_blank" style="color:var(--red2);text-decoration:underline">Genius</a>.</p>'+
        '</div>';
    });
}
function renderLyrics(body, lyrics) {
  
  var clean = lyrics.replace(/\r\n/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
  body.innerHTML = '<div class="lyrics-text"></div>';
  body.querySelector('.lyrics-text').textContent = clean;

  } else {
    var ta = document.createElement('textarea');
    ta.value = url; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('Link copied!'); } catch(e) {}

var reg=(function(){
  var lists={},tracks={},lc=0,tc=0;
  
  var trackById={};
  return {
    _tracks: tracks,
    storeList:  function(a){
      
      if(a.__regKey) return a.__regKey;
      var k='L'+(++lc); lists[k]=a; a.__regKey=k; return k;
    },
    storeTrack: function(t){
      
      if(t.id && trackById[t.id]) return trackById[t.id];
      var k='T'+(++tc); tracks[k]=t;
      if(t.id) trackById[t.id]=k;
      return k;
    },
    getList:    function(k){return lists[k]||[];},
    getTrack:   function(k){return tracks[k]||null;},
  };
})();

function wireRows(container) {
  
  if(container._delegated) {
    container.removeEventListener('click',    container._delegated.click);
    container.removeEventListener('contextmenu', container._delegated.ctx);
  }
  function onClick(e) {
    var dl = e.target.closest('.tdl-btn');
    if(dl){ e.stopPropagation(); var t=reg.getTrack(dl.dataset.tk); if(t) downloadTrack(t); return; }
    var cdl = e.target.closest('.card-dl');
    if(cdl){ e.stopPropagation(); var t2=reg.getTrack(cdl.dataset.tk); if(t2) downloadTrack(t2); return; }
    var cp = e.target.closest('.card-play');
    if(cp){ e.stopPropagation(); playFromReg(cp.dataset.lk, cp.dataset.idx); return; }
    var card = e.target.closest('.mcard');
    if(card){ playFromReg(card.dataset.lk, card.dataset.idx); return; }
    var row = e.target.closest('.trow');
    if(row){ playFromReg(row.dataset.lk, row.dataset.idx); return; }
  }
  function onCtx(e) {
    var row  = e.target.closest('.trow');
    var card = e.target.closest('.mcard');
    var el   = row || card;
    if(el){ ctxFromReg(e, el.dataset.tk); }
  }
  container.addEventListener('click',       onClick);
  container.addEventListener('contextmenu', onCtx);
  container._delegated = {click: onClick, ctx: onCtx};
  setTimeout(checkHashAndScroll, 80);
}

function hlPlaying(id, force) {
  clearTimeout(_hlTimer);

    if (_lastHlId) {
      document.querySelectorAll('.trow[data-id="'+_lastHlId+'"]').forEach(function(r){
        r.classList.remove('playing');
        var n=r.querySelector('.tnum'); if(n) n.textContent=r.dataset.num;
      });
    }
    if (id) {
      document.querySelectorAll('.trow[data-id="'+id+'"]').forEach(function(r){
        r.classList.add('playing');
        var n=r.querySelector('.tnum'); if(n) n.textContent='▶';

  }, 30);
}

var LAZY_PAGE = 20;
function lazyTrackList(tracks, container) {
  var rendered = 0;
  var list = document.createElement('div');
  list.className = 'track-list';
  var sentinel = document.createElement('div');
  sentinel.style.cssText = 'height:1px;';

  function renderMore() {
    var end  = Math.min(rendered + LAZY_PAGE, tracks.length);
    var frag = document.createDocumentFragment();
    for (var i = rendered; i < end; i++) {
      frag.appendChild(tRowEl(tracks[i], i, tracks));
    }
    list.appendChild(frag);
    rendered = end;
    if (rendered >= tracks.length) {
      if (sentinel.parentNode) sentinel.parentNode.removeChild(sentinel);
      if (obs) { obs.disconnect(); obs = null; }
    }
    var playingId = queue[qIdx] && queue[qIdx].id;
    if (playingId) hlPlaying(playingId, true);
  }

  var obs = null;
  if (typeof IntersectionObserver !== 'undefined') {
    obs = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) renderMore();
    }, { root: null, rootMargin: '300px', threshold: 0 });
    obs.observe(sentinel);
  }

  renderMore();
  list.appendChild(sentinel);
  container.appendChild(list);
  wireRows(container);
  hlPlaying(queue[qIdx] && queue[qIdx].id);
  return function destroy() { if (obs) { obs.disconnect(); obs = null; } };
}

function tod() { var h=new Date().getHours(); return h<12?'morning':h<17?'afternoon':'evening'; }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
var uploadFile = null;
function openUploadModal() {
  uploadFile = null;
  document.getElementById('uploadFileName').textContent = '';
  document.getElementById('uploadFileName').classList.add('hidden');
  document.getElementById('uploadTitle').value = '';
  document.getElementById('uploadArtist').value = 'Juice WRLD';
  document.getElementById('uploadCategory').value = 'unreleased';
  document.getElementById('uploadEra').value = '';
  document.getElementById('uploadProgress').style.display = 'none';
  document.getElementById('uploadProgressFill').style.width = '0%';
  document.getElementById('uploadStatus').textContent = '';
  document.getElementById('uploadStatus').className = 'upload-status';
  document.getElementById('uploadModal').classList.remove('hidden');
}
function closeUploadModal() {
  document.getElementById('uploadModal').classList.add('hidden');
  uploadFile = null;
}
function handleUploadFile(file) {
  if (!file || !file.type.startsWith('audio/')) {
    setUploadStatus('Please select an audio file.', 'err');
    return;
  }
  if (file.size > 100 * 1024 * 1024) {
    setUploadStatus('File exceeds 100 MB limit.', 'err');
    return;
  }
  uploadFile = file;
  var fnEl = document.getElementById('uploadFileName');
  fnEl.textContent = file.name;
  fnEl.classList.remove('hidden');
  if (!document.getElementById('uploadTitle').value) {
    document.getElementById('uploadTitle').value = file.name.replace(/\.[^.]+$/, '');
  }
  setUploadStatus('', '');
}
function setUploadStatus(msg, type) {
  var el = document.getElementById('uploadStatus');
  el.textContent = msg;
  el.className = 'upload-status' + (type ? ' ' + type : '');
}
function doUpload() {
  if (!uploadFile) { setUploadStatus('Select an audio file first.', 'err'); return; }
  var title    = document.getElementById('uploadTitle').value.trim();
  var artist   = document.getElementById('uploadArtist').value.trim() || 'Juice WRLD';
  var category = document.getElementById('uploadCategory').value;
  var era      = document.getElementById('uploadEra').value.trim();
  if (!title) { setUploadStatus('Enter a song title.', 'err'); return; }
  var prog = document.getElementById('uploadProgress');
  var fill = document.getElementById('uploadProgressFill');
  prog.style.display = 'block';
  fill.style.width = '0%';
  setUploadStatus('Uploading…', '');
  document.getElementById('btnDoUpload').disabled = true;
  var formData = new FormData();
  formData.append('file', uploadFile, uploadFile.name);
  formData.append('title', title);
  formData.append('artist', artist);
  formData.append('category', category);
  if (era) formData.append('era', era);
  var xhr = new XMLHttpRequest();
  xhr.open('POST', WORKER_URL + '/upload');
  xhr.upload.addEventListener('progress', function(e) {
    if (e.lengthComputable) {
      fill.style.width = Math.round((e.loaded / e.total) * 90) + '%';
    }
  });
  xhr.addEventListener('load', function() {
    fill.style.width = '100%';
    if (xhr.status >= 200 && xhr.status < 300) {
      setUploadStatus('Uploaded successfully! Song sent to GitHub.', 'ok');
      document.getElementById('btnDoUpload').disabled = false;
      setTimeout(closeUploadModal, 1800);
    } else {
      var msg = 'Upload failed.';
      try { msg = JSON.parse(xhr.responseText).error || msg; } catch(e2) {}
      setUploadStatus(msg, 'err');
      document.getElementById('btnDoUpload').disabled = false;
    }
  });
  xhr.addEventListener('error', function() {
    setUploadStatus('Network error. Check your upload worker URL.', 'err');
    document.getElementById('btnDoUpload').disabled = false;
  });
  xhr.send(formData);
}
var drop = document.getElementById('uploadDrop');
drop.addEventListener('click', function() { document.getElementById('uploadFileInput').click(); });
drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.classList.add('drag-over'); });
drop.addEventListener('dragleave', function() { drop.classList.remove('drag-over'); });
drop.addEventListener('drop', function(e) {
  e.preventDefault();
  drop.classList.remove('drag-over');
  var f = e.dataTransfer.files[0];
  if (f) handleUploadFile(f);
});
document.getElementById('uploadFileInput').addEventListener('change', function() {

});

});

(function() {
  function setMobActive(id) {
    document.querySelectorAll('.mob-nav-item').forEach(function(b){ b.classList.remove('active'); });
    var el = document.getElementById(id);
    if (el) el.classList.add('active');
  }
  var mHome = document.getElementById('mobNavHome');
  var mSearch = document.getElementById('mobNavSearch');
  var mRandom = document.getElementById('mobNavRandom');
  var mLib = document.getElementById('mobNavLibrary');
  var mUpload = document.getElementById('mobNavUpload');

  if (mHome) mHome.addEventListener('click', function(){ setMobActive('mobNavHome'); showHome(); });
  if (mSearch) mSearch.addEventListener('click', function(){ setMobActive('mobNavSearch'); focusSearch(); });
  if (mRandom) mRandom.addEventListener('click', function(){ setMobActive('mobNavRandom'); showRandomPage(); });
  if (mLib) mLib.addEventListener('click', function(){
    setMobActive('mobNavLibrary');
    // Show liked songs as library on mobile
    showLikedPage();
  });
  if (mUpload) mUpload.addEventListener('click', function(){ openUploadModal(); });

  // Sync mobile nav active state when desktop nav is used
  var origShowHome = showHome;
  showHome = function() { origShowHome.apply(this, arguments); setMobActive('mobNavHome'); };
  var origFocusSearch = focusSearch;
  focusSearch = function() { origFocusSearch.apply(this, arguments); setMobActive('mobNavSearch'); };
  var origShowRandomPage = showRandomPage;
  showRandomPage = function() { origShowRandomPage.apply(this, arguments); setMobActive('mobNavRandom'); };
})();
